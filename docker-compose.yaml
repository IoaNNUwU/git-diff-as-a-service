services:

  git-diff-app-postgres:
    image: postgres:18.1-bookworm
    container_name: git-diff-app-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

      - PGDATA=${PGDATA}
      - PGDATA_HOME=${PGDATA_HOME}
    ports:
      - "5432:5432"
    volumes:
      - ${PGDATA_HOME}:${PGDATA}
    restart: always

  git-diff-app-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations